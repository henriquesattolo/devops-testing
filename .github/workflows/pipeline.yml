name: Pipeline com Testes Automatizados

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 1 - Checkout
        uses: actions/checkout@v4

      - name: 2 - Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3 - Instalar dependencias
        run: pip install -r requirements.txt

      - name: 4 - Rodar testes
        run: python3 -m pytest tests/ -v --cov=app --cov-report=xml

      - name: 5 - Verificar qualidade do codigo
        run: flake8 app/ --max-line-length=100 --ignore=E501

      - name: 6 - Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 1 - Checkout
        uses: actions/checkout@v4

      - name: 2 - Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3 - Build e Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-testing:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/devops-testing:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-testing:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-testing:${{ github.sha }}
